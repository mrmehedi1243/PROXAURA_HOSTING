<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDX-HOSTING | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div class="glass w-full max-w-[400px] p-10 rounded-[3rem] text-center">
        <div class="w-16 h-16 bg-purple-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-purple-500/30"><i class="fa-solid fa-bolt text-3xl text-purple-400"></i></div>
        <h1 class="text-3xl font-black text-white italic uppercase mb-2">BDX-HOSTING</h1>
        <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-8">System Commander Login</p>
        
        {% if error %}<div class="bg-red-500/10 text-red-400 p-3 rounded-xl mb-6 text-[10px] font-black uppercase">{{ error }}</div>{% endif %}

        <form action="/login" method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="USERNAME" required class="w-full py-4 px-6 bg-black/40 border border-white/10 rounded-2xl text-white text-sm focus:outline-none focus:border-purple-500 transition-all">
            <input type="password" name="password" placeholder="PASSWORD" required class="w-full py-4 px-6 bg-black/40 border border-white/10 rounded-2xl text-white text-sm focus:outline-none focus:border-purple-500 transition-all">
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl text-white font-black uppercase tracking-widest text-xs hover:scale-105 transition-all">Initialize</button>
        </form>
        <p class="mt-8 text-slate-500 text-[10px] font-black uppercase">New Here? <a href="/signup" class="text-purple-400">Create Identity</a></p>
    </div>
</body>
</html>
