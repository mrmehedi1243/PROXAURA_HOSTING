<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDX-HOSTING | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 100% 100%, #1e1b4b 0%, #020617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 400px;
        }
        .input-field {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .signup-btn {
            background: linear-gradient(135deg, #d946ef 0%, #8b5cf6 100%);
        }
    </style>
</head>
<body>

    <div class="glass-panel p-8 md:p-10 rounded-[2.5rem]">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-pink-600/20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-pink-500/30">
                <i class="fa-solid fa-user-plus text-3xl text-pink-400"></i>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tighter italic uppercase">Join BDX-HOSTING</h1>
            <p class="text-slate-500 text-xs mt-1 font-bold uppercase tracking-widest">Register New Infrastructure</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 text-red-400 p-3 rounded-xl mb-6 border border-red-500/20 text-[10px] font-black flex items-center gap-2 uppercase">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/signup" method="POST" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[9px] uppercase tracking-widest font-black text-slate-500 ml-2">New Username</label>
                <div class="relative">
                    <i class="fa-solid fa-at absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" name="username" placeholder="Choose ID" required
                        class="input-field w-full py-4 pl-12 pr-6 rounded-2xl text-white text-sm focus:outline-none border-white/10">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[9px] uppercase tracking-widest font-black text-slate-500 ml-2">Security Password</label>
                <div class="relative">
                    <i class="fa-solid fa-shield-halved absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" name="password" placeholder="Create Passkey" required
                        class="input-field w-full py-4 pl-12 pr-6 rounded-2xl text-white text-sm focus:outline-none border-white/10">
                </div>
            </div>
            
            <button type="submit" class="signup-btn w-full text-white font-black py-4 rounded-2xl transition-all mt-4 uppercase tracking-widest text-[10px] flex items-center justify-center gap-2 shadow-lg shadow-pink-500/20">
                Create Account <i class="fa-solid fa-circle-check"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-tight">Already a member? 
                <a href="/login" class="text-pink-400 font-black hover:underline ml-1">Login Here</a>
            </p>
        </div>
    </div>

</body>
</html>
